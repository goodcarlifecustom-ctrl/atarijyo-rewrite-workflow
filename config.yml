# SEOリライト共通設定：タスク詳細HTML貼り付け運用版

workflow:
  mode: "single_article_task_detail"
  article_html_source: "codex_task_detail"
  use_article_html_file: false
  process_multiple_articles_at_once: false
  target: "1タスクにつき1記事のみ処理する"

input_policy:
  article_url_source: "codex_task_detail"
  main_keyword_source: "codex_task_detail"
  search_console_source: "codex_task_detail_or_csv"
  ahrefs_source: "codex_task_detail_or_csv"
  article_html_source: "codex_task_detail"
  decoration_prompt: "prompts/decoration_prompt.md"
  common_rewrite_prompt: "prompts/common_rewrite_prompt.md"
  wp_safety_rules: "prompts/wp_safety_rules.md"
  output_format: "prompts/output_format.md"

rewrite_policy:
  use_search_console: true
  use_ahrefs_if_available: true
  use_serp_if_provided: true
  simple_rewrite_for_30_articles: true
  add_missing_headings_limit: "1〜3個まで"
  suggest_deletions: true
  preserve_affiliate_links: true
  preserve_shortcodes: true
  preserve_swell_blocks: true
  preserve_existing_tables: true
  preserve_ad_tags: true
  preserve_tracking_tags: true
  avoid_keyword_stuffing: true
  copy_competitor_headings_directly: false

keyword_policy:
  classify_keywords:
    - "A: 見出しに入れる"
    - "B: 本文に自然に入れる"
    - "C: 注意喚起・補足として扱う"
    - "D: 使わない"
  prioritize:
    - "クリック数が多い"
    - "表示回数が多く順位5〜15位"
    - "CTRが低く改善余地がある"
    - "title / h2 / h3 に入っていない"
    - "Ahrefsで検索ボリュームやTraffic Potentialがある"

output_policy:
  create_rewrite_report: true
  create_review_html_with_highlight: true
  create_wp_html_without_highlight: true
  create_delete_suggestions: true

wordpress:
  enabled: false
  post_type: "post"
  status: "draft"
  draft_only: true
  allow_update_existing: false
  allow_publish: false
  allow_future: false
  require_dry_run_first: true
  dry_run: true
  forbidden_base_url: "https://example.com"

safety_rules:
  - "既存記事は絶対に更新しない"
  - "WordPressには必ず新規下書きとして作成する"
  - "statusはdraft固定"
  - "publish / future / private は禁止"
  - "変更箇所の色付けは確認用HTMLだけに入れる"
  - "WordPress投入用HTMLからは色付けタグを削除する"
  - "SWELLブロック、ショートコード、広告タグ、アフィリエイトリンクは壊さない"
  - "記事HTMLはzip内ではなく、Codexタスク詳細欄の【現在の記事HTML】を使う"
